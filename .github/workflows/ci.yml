name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip uninstall -y multipart
          pip install --force-reinstall python-multipart==0.0.12

      - name: Run unit tests
        run: pytest

      - name: Verify exported model artifact exists
        run: test -f models/credit_default_pipeline.joblib

      - name: Verify monitoring reports exist
        run: |
          test -f reports/test_monitoring_report.html
          test -f reports/changed_test_monitoring_report.html

  docker-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mlops-final:ci .
