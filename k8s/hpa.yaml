apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: credit-default-api
  namespace: mlops-final
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: credit-default-api
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
